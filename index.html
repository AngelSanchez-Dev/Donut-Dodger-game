<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homer's Donut Panic!</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --sky1: #87CEEB;
  --sky2: #b8e4f9;
  --yellow: #FFD90F;
  --skin:  #FED46A;
  --white: #FFFFFF;
  --pink:  #FF69B4;
  --donut-glaze: #FF85C1;
  --sprinkle1: #FF4500;
  --sprinkle2: #00CED1;
  --sprinkle3: #7CFC00;
  --ground1: #5DBB63;
  --ground2: #3A8C3F;
  --road: #555;
  --shadow: rgba(0,0,0,0.18);
  --ui-bg: rgba(255,255,255,0.92);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a0a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Bangers', cursive;
  overflow: hidden;
  user-select: none;
}

#game-wrap {
  position: relative;
  width: 800px;
  box-shadow: 0 0 0 4px #FFD90F, 0 0 0 8px #FF4500, 0 12px 60px rgba(0,0,0,0.6);
  border-radius: 6px;
  overflow: hidden;
}

canvas { display: block; }

/* ── HUD ── */
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 16px;
  pointer-events: none;
  z-index: 10;
}

.hud-pill {
  background: rgba(255,217,15,0.92);
  border: 3px solid #FF4500;
  border-radius: 30px;
  padding: 4px 16px;
  font-size: 22px;
  color: #333;
  letter-spacing: 1px;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
  box-shadow: 0 3px 0 #FF4500;
  line-height: 1.3;
}

.hud-pill span { font-size: 13px; display: block; line-height: 1; color: #666; font-family: 'Nunito', sans-serif; font-weight: 700; }

/* ── Lives ── */
#lives-display {
  display: flex;
  gap: 4px;
  align-items: center;
}

/* ── Overlay ── */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(3px);
}
.overlay.hidden { display: none; }

.overlay-card {
  background: white;
  border: 5px solid #FFD90F;
  border-radius: 20px;
  padding: 30px 50px;
  text-align: center;
  box-shadow: 0 0 0 3px #FF4500, 0 12px 40px rgba(0,0,0,0.4);
  max-width: 420px;
}

.overlay-card h1 {
  font-size: 52px;
  color: #FF4500;
  line-height: 1;
  text-shadow: 3px 3px 0 #FFD90F;
  letter-spacing: 2px;
}

.overlay-card h2 {
  font-size: 36px;
  color: #FF4500;
  text-shadow: 2px 2px 0 #FFD90F;
}

.overlay-card p {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: #555;
  margin-top: 6px;
  line-height: 1.5;
}

.overlay-card .score-big {
  font-size: 44px;
  color: #333;
  margin: 10px 0 4px;
}

.overlay-card .hi-line {
  font-size: 20px;
  color: #888;
  margin-bottom: 14px;
}

.btn-start {
  display: inline-block;
  background: #FF4500;
  color: white;
  border: none;
  border-radius: 50px;
  padding: 12px 36px;
  font-family: 'Bangers', cursive;
  font-size: 26px;
  letter-spacing: 2px;
  cursor: pointer;
  box-shadow: 0 5px 0 #c23000;
  transition: transform 0.1s, box-shadow 0.1s;
  margin-top: 10px;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #c23000; }
.btn-start:active { transform: translateY(2px); box-shadow: 0 2px 0 #c23000; }

.donut-emoji { font-size: 48px; animation: spin 2s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── D'oh flash ── */
#doh-flash {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 15;
  opacity: 0;
  transition: opacity 0.1s;
}
#doh-text {
  font-size: 120px;
  color: #FF4500;
  text-shadow: 4px 4px 0 #FFD90F, -2px -2px 0 #FF0000;
  transform: rotate(-8deg);
}
</style>
</head>
<body>

<div id="game-wrap">
  <canvas id="c" width="800" height="400"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-pill"><span>SCORE</span><span id="score-val">0</span></div>
    <div id="lives-display"></div>
    <div class="hud-pill"><span>BEST</span><span id="hi-val">0</span></div>
  </div>

  <!-- D'oh flash -->
  <div id="doh-flash"><div id="doh-text">D'oh!</div></div>

  <!-- Start screen -->
  <div class="overlay" id="screen-start">
    <div class="overlay-card">
      <div class="donut-emoji">🍩</div>
      <h1>HOMER'S<br>DONUT PANIC!</h1>
      <p>¡Ayuda a Homer a esquivar las rosquillas!<br>
         Usa <b>↑ ↓</b> o <b>W S</b> para moverte.<br>
         3 vidas · ¡La velocidad aumenta!</p>
      <button class="btn-start" id="btn-start">¡JUGAR!</button>
    </div>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="screen-over">
    <div class="overlay-card">
      <h2>¡MMMMM... <br>ROSQUILLAS!</h2>
      <div class="score-big" id="final-score">0</div>
      <div class="hi-line">MEJOR: <span id="final-hi">0</span></div>
      <button class="btn-start" id="btn-restart">¡OTRA VEZ!</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  SETUP
// ══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 400;

// ══════════════════════════════════════════════
//  PARALLAX LAYERS CONFIG
// ══════════════════════════════════════════════
// Each layer: array of objects {x, ...props}, speed multiplier
const layers = {
  sky:     { spd: 0.0,  items: [] },
  clouds:  { spd: 0.3,  items: [] },
  hills:   { spd: 0.5,  items: [] },
  houses:  { spd: 0.8,  items: [] },
  trees:   { spd: 1.1,  items: [] },
  ground:  { spd: 1.0,  items: [] },
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let state  = 'start';
let score  = 0;
let hi     = 0;
let lives  = 3;
let speed  = 3.5;
let frame  = 0;
let raf    = null;
let invincible = 0; // frames of invincibility after hit

// Homer
const HOMER_X = 130;
const LANES   = [90, 180, 270, 320]; // y positions (top of homer hitbox)
// Actually use free vertical movement
const homer = {
  x: HOMER_X,
  y: H / 2 - 40,
  w: 62, h: 72,
  vy: 0,
  targetY: H / 2 - 40,
  moving: { up: false, down: false },
};

const HOMER_MIN_Y = 40;
const HOMER_MAX_Y = H - 120;
const HOMER_SPD   = 4.5;

// Donuts
let donuts     = [];
let donutTimer = 0;
let donutInterval = 70;

// Particles
let particles = [];

// Drool drops
let drools = [];

// Score popups
let popups = [];

// ══════════════════════════════════════════════
//  INIT LAYERS
// ══════════════════════════════════════════════
function initLayers() {
  // Clouds
  layers.clouds.items = [];
  for (let i = 0; i < 5; i++) {
    layers.clouds.items.push({
      x: Math.random() * W,
      y: 20 + Math.random() * 80,
      w: 90 + Math.random() * 80,
      h: 30 + Math.random() * 20,
    });
  }
  // Hills (big blobs in bg)
  layers.hills.items = [];
  for (let i = 0; i < 4; i++) {
    layers.hills.items.push({
      x: i * 220 + Math.random() * 80,
      y: H - 160,
      r: 120 + Math.random() * 60,
      col: i % 2 === 0 ? '#6CC26C' : '#5DBB63',
    });
  }
  // Houses
  layers.houses.items = [];
  for (let i = 0; i < 5; i++) {
    layers.houses.items.push({
      x: i * 180 + Math.random() * 60,
      y: H - 190,
      w: 70 + Math.random() * 30,
      h: 80 + Math.random() * 30,
      col: ['#E8B89A','#D4A574','#C8A882','#E8C9A0'][Math.floor(Math.random()*4)],
      roofCol: ['#CC4444','#884422','#AA3333','#BB5533'][Math.floor(Math.random()*4)],
    });
  }
  // Trees
  layers.trees.items = [];
  for (let i = 0; i < 8; i++) {
    layers.trees.items.push({
      x: i * 110 + Math.random() * 40,
      y: H - 145,
      h: 55 + Math.random() * 30,
      trunk: 8 + Math.random() * 4,
      col: ['#228B22','#2E8B57','#3CB371'][Math.floor(Math.random()*3)],
    });
  }
}

// ══════════════════════════════════════════════
//  SPAWN DONUT
// ══════════════════════════════════════════════
const DONUT_COLORS = [
  { glaze: '#FF85C1', sprinkles: ['#FF4500','#00CED1','#7CFC00','#FFD700'] },
  { glaze: '#FF69B4', sprinkles: ['#4169E1','#FF6347','#00FA9A','#FFD700'] },
  { glaze: '#DDA0DD', sprinkles: ['#FF4500','#00CED1','#FF1493','#FFD700'] },
  { glaze: '#87CEEB', sprinkles: ['#FF69B4','#FF4500','#7CFC00','#FFD700'] },
];

function spawnDonut() {
  const y    = 70 + Math.random() * (H - 200);
  const col  = DONUT_COLORS[Math.floor(Math.random() * DONUT_COLORS.length)];
  const r    = 24 + Math.random() * 10;
  const rot  = Math.random() * Math.PI * 2;
  const rotV = (Math.random() - 0.5) * 0.08;
  // Some donuts curve up/down
  const vy   = (Math.random() - 0.5) * 1.5;

  donuts.push({ x: W + r + 10, y, r, col, rot, rotV, vy, wobble: Math.random() * Math.PI * 2 });
}

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
function burst(x, y, colors, n = 14) {
  for (let i = 0; i < n; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 3,
      alpha: 1,
      col: colors[Math.floor(Math.random() * colors.length)],
      r: 3 + Math.random() * 4,
      isSquare: Math.random() > 0.5,
    });
  }
}

function addPopup(x, y, text, col) {
  popups.push({ x, y, text, col, alpha: 1, vy: -1.5 });
}

// ══════════════════════════════════════════════
//  LIVES UI
// ══════════════════════════════════════════════
function renderLivesUI() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.style.cssText = `
      width:30px; height:30px; border-radius:50%;
      background: ${i < lives ? '#FF69B4' : '#555'};
      border: 3px solid ${i < lives ? '#FF4500' : '#333'};
      box-shadow: ${i < lives ? '0 0 8px #FF69B4' : 'none'};
      transition: all 0.3s;
      display:flex; align-items:center; justify-content:center;
      font-size:14px;
    `;
    d.textContent = i < lives ? '🍩' : '✕';
    el.appendChild(d);
  }
}

// ══════════════════════════════════════════════
//  DRAW HOMER (canvas art)
// ══════════════════════════════════════════════
function drawHomer(x, y, flash) {
  ctx.save();
  ctx.translate(x, y);

  if (flash && Math.floor(Date.now() / 80) % 2 === 0) {
    ctx.globalAlpha = 0.35;
  }

  const W = 62, H = 72;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(W/2, H + 4, 22, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // ── Shoes ──
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(10, H-2, 14, 7, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(W-8, H-2, 14, 7, 0.2, 0, Math.PI*2); ctx.fill();

  // ── Pants (blue) ──
  ctx.fillStyle = '#4169E1';
  ctx.beginPath();
  ctx.roundRect(6, H*0.60, W-12, H*0.30, 4);
  ctx.fill();

  // Belt
  ctx.fillStyle = '#222';
  ctx.fillRect(6, H*0.57, W-12, 6);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(W/2-5, H*0.57, 10, 6);

  // ── Shirt (white) ──
  ctx.fillStyle = '#F5F5F5';
  ctx.beginPath();
  ctx.roundRect(8, H*0.30, W-16, H*0.32, [0,0,6,6]);
  ctx.fill();

  // ── Body / Belly (skin) ──
  ctx.fillStyle = '#FED46A';
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.42, 22, 24, 0, 0, Math.PI*2);
  ctx.fill();
  // Belly outline
  ctx.strokeStyle = '#D4A020';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.44, 22, 24, 0, 0, Math.PI*2);
  ctx.stroke();

  // Navel
  ctx.fillStyle = '#D4A020';
  ctx.beginPath();
  ctx.arc(W/2, H*0.54, 3, 0, Math.PI*2);
  ctx.fill();

  // ── Arms ──
  ctx.fillStyle = '#FED46A';
  // Left arm
  ctx.beginPath();
  ctx.ellipse(4, H*0.40, 7, 16, -0.3, 0, Math.PI*2);
  ctx.fill();
  // Left hand (mitten shape)
  ctx.beginPath();
  ctx.ellipse(2, H*0.56, 9, 8, 0.2, 0, Math.PI*2);
  ctx.fill();
  // Right arm (raised slightly)
  ctx.beginPath();
  ctx.ellipse(W-4, H*0.38, 7, 16, 0.3, 0, Math.PI*2);
  ctx.fill();
  // Right hand
  ctx.beginPath();
  ctx.ellipse(W-2, H*0.54, 9, 8, -0.2, 0, Math.PI*2);
  ctx.fill();

  // ── Head ──
  ctx.fillStyle = '#FED46A';
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.20, 22, 21, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#D4A020';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── Ear ──
  ctx.fillStyle = '#FED46A';
  ctx.beginPath();
  ctx.arc(W-2, H*0.20, 7, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#D4A020'; ctx.lineWidth = 1;
  ctx.stroke();

  // ── Eyes ──
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.ellipse(W/2-7, H*0.17, 6, 6.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(W/2+5, H*0.17, 6, 6.5, 0, 0, Math.PI*2); ctx.fill();
  // Pupils
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(W/2-6, H*0.18, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W/2+6, H*0.18, 3.5, 0, Math.PI*2); ctx.fill();
  // Shine
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(W/2-5, H*0.16, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W/2+7, H*0.16, 1.5, 0, Math.PI*2); ctx.fill();

  // ── Eyebrows (heavy) ──
  ctx.fillStyle = '#4a3000';
  ctx.beginPath();
  ctx.roundRect(W/2-13, H*0.10, 11, 4, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(W/2+2, H*0.10, 11, 4, 2);
  ctx.fill();

  // ── Nose ──
  ctx.fillStyle = '#E8A040';
  ctx.beginPath();
  ctx.ellipse(W/2+10, H*0.22, 6, 5, 0.4, 0, Math.PI*2);
  ctx.fill();

  // ── Mouth (smile) ──
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(W/2+2, H*0.26, 8, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // ── Stubble (5 o'clock) ──
  ctx.fillStyle = '#C8A060';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(W/2-4 + i*4, H*0.28, 1.2, 0, Math.PI*2);
    ctx.fill();
  }

  // ── Hair (5 hairs) ──
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  const hairBase = [W/2-6, W/2-2, W/2+2, W/2+6, W/2+10];
  hairBase.forEach((hx, i) => {
    ctx.beginPath();
    ctx.moveTo(hx, H*0.02);
    ctx.quadraticCurveTo(hx + (i-2)*3, H*0.02 - 10, hx + (i-2)*2, H*0.02 - 18);
    ctx.stroke();
  });

  ctx.restore();
}

// ══════════════════════════════════════════════
//  DRAW DONUT
// ══════════════════════════════════════════════
function drawDonut(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.rotate(d.rot);

  const r = d.r;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(3, r*0.2, r*0.9, r*0.3, 0, 0, Math.PI*2);
  ctx.fill();

  // Donut body (ring using two circles)
  ctx.fillStyle = '#C87941';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();

  // Glaze
  ctx.fillStyle = d.col.glaze;
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.85, 0, Math.PI*2);
  ctx.fill();

  // Glaze drip highlight
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-r*0.2, -r*0.35, r*0.35, r*0.2, -0.3, 0, Math.PI*2);
  ctx.fill();

  // Hole
  ctx.fillStyle = 'transparent';
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.38, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // Sprinkles
  const sprinklePositions = [
    [-r*0.5, -r*0.55], [r*0.4, -r*0.5], [-r*0.6, r*0.1],
    [r*0.55, r*0.2], [0, r*0.6], [-r*0.2, r*0.5], [r*0.2, -r*0.2],
  ];
  sprinklePositions.forEach(([sx, sy], i) => {
    const col = d.col.sprinkles[i % d.col.sprinkles.length];
    ctx.fillStyle = col;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(i * 0.9);
    ctx.beginPath();
    ctx.roundRect(-4, -1.5, 8, 3, 2);
    ctx.fill();
    ctx.restore();
  });

  ctx.restore();
}

// ══════════════════════════════════════════════
//  DRAW PARALLAX BG
// ══════════════════════════════════════════════
function drawBackground(gameSpeed) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.65);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#C9E8F5');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H * 0.65);

  // Sun
  ctx.fillStyle = '#FFE44D';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 30;
  ctx.beginPath(); ctx.arc(W - 80, 55, 38, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Sun rays
  ctx.strokeStyle = 'rgba(255,220,60,0.3)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(W - 80 + Math.cos(a) * 44, 55 + Math.sin(a) * 44);
    ctx.lineTo(W - 80 + Math.cos(a) * 62, 55 + Math.sin(a) * 62);
    ctx.stroke();
  }

  // Clouds
  layers.clouds.items.forEach(c => {
    ctx.fillStyle = 'rgba(255,255,255,0.90)';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - c.w*0.2, c.y + c.h*0.1, c.w*0.35, c.h*0.45, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.22, c.y + c.h*0.1, c.w*0.38, c.h*0.45, 0, 0, Math.PI*2); ctx.fill();
  });

  // Hills
  layers.hills.items.forEach(h => {
    ctx.fillStyle = h.col;
    ctx.beginPath(); ctx.arc(h.x, h.y, h.r, Math.PI, 0); ctx.fill();
  });

  // Houses
  layers.houses.items.forEach(h => {
    // House body
    ctx.fillStyle = h.col;
    ctx.fillRect(h.x, h.y, h.w, h.h);
    // Roof
    ctx.fillStyle = h.roofCol;
    ctx.beginPath();
    ctx.moveTo(h.x - 8, h.y);
    ctx.lineTo(h.x + h.w/2, h.y - 30);
    ctx.lineTo(h.x + h.w + 8, h.y);
    ctx.fill();
    // Window
    ctx.fillStyle = '#FFE87C';
    ctx.fillRect(h.x + h.w*0.15, h.y + h.h*0.2, h.w*0.3, h.h*0.25);
    ctx.fillRect(h.x + h.w*0.55, h.y + h.h*0.2, h.w*0.3, h.h*0.25);
    // Door
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.roundRect(h.x + h.w*0.35, h.y + h.h*0.55, h.w*0.3, h.h*0.45, [4,4,0,0]);
    ctx.fill();
  });

  // Trees
  layers.trees.items.forEach(t => {
    // Trunk
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(t.x - t.trunk/2, t.y, t.trunk, t.h * 0.55);
    // Canopy (3 circles)
    ctx.fillStyle = t.col;
    ctx.beginPath(); ctx.arc(t.x, t.y - t.h*0.05, t.h*0.42, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(t.x - t.h*0.22, t.y + t.h*0.08, t.h*0.32, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(t.x + t.h*0.22, t.y + t.h*0.08, t.h*0.32, 0, Math.PI*2); ctx.fill();
  });

  // Ground strip
  const gGrad = ctx.createLinearGradient(0, H-130, 0, H);
  gGrad.addColorStop(0, '#5DBB63');
  gGrad.addColorStop(0.3, '#4aaa50');
  gGrad.addColorStop(1, '#3A8C3F');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, H-130, W, 130);

  // Road / sidewalk
  ctx.fillStyle = '#888';
  ctx.fillRect(0, H-80, W, 80);
  // Road markings
  ctx.fillStyle = '#666';
  ctx.fillRect(0, H-82, W, 4);
  // Dashes
  ctx.setLineDash([30, 20]);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.lineDashOffset = -(frame * gameSpeed * 1.0) % 50;
  ctx.beginPath();
  ctx.moveTo(0, H-42); ctx.lineTo(W, H-42);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ══════════════════════════════════════════════
//  UPDATE LAYERS (scroll)
// ══════════════════════════════════════════════
function updateLayers(spd) {
  // Clouds
  layers.clouds.items.forEach(c => {
    c.x -= spd * layers.clouds.spd;
    if (c.x < -100) {
      c.x = W + 60;
      c.y = 20 + Math.random() * 80;
    }
  });
  // Hills
  layers.hills.items.forEach(h => {
    h.x -= spd * layers.hills.spd;
    if (h.x < -200) h.x = W + 200;
  });
  // Houses
  layers.houses.items.forEach(h => {
    h.x -= spd * layers.houses.spd;
    if (h.x < -120) h.x = W + 60 + Math.random() * 80;
  });
  // Trees
  layers.trees.items.forEach(t => {
    t.x -= spd * layers.trees.spd;
    if (t.x < -60) t.x = W + 40 + Math.random() * 60;
  });
}

// ══════════════════════════════════════════════
//  COLLISION
// ══════════════════════════════════════════════
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX, dy = cy - nearY;
  return dx*dx + dy*dy < (cr * 0.75) * (cr * 0.75); // 0.75 forgiveness
}

// ══════════════════════════════════════════════
//  D'oh FLASH
// ══════════════════════════════════════════════
let dohTimer = 0;
function triggerDoh() {
  const el = document.getElementById('doh-flash');
  el.style.opacity = '1';
  dohTimer = 40;
}

// ══════════════════════════════════════════════
//  RESET / START
// ══════════════════════════════════════════════
function resetGame() {
  score  = 0; lives = 3; speed = 3.5; frame = 0;
  donuts = []; particles = []; popups = []; drools = [];
  donutTimer = 0; donutInterval = 70; invincible = 0; dohTimer = 0;
  homer.y = H / 2 - 40;
  homer.vy = 0;
  document.getElementById('score-val').textContent = '0';
  document.getElementById('hi-val').textContent = hi;
  renderLivesUI();
  document.getElementById('doh-flash').style.opacity = '0';
}

function startGame() {
  document.getElementById('screen-start').classList.add('hidden');
  initLayers();
  resetGame();
  state = 'running';
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function restartGame() {
  document.getElementById('screen-over').classList.add('hidden');
  initLayers();
  resetGame();
  state = 'running';
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function triggerGameOver() {
  state = 'over';
  if (score > hi) hi = score;
  document.getElementById('final-score').textContent = Math.floor(score);
  document.getElementById('final-hi').textContent = Math.floor(hi);
  document.getElementById('screen-over').classList.remove('hidden');
}

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
function update() {
  frame++;

  // Speed ramp
  speed = Math.min(3.5 + frame * 0.001, 10);

  // Score
  score += speed * 0.04;
  document.getElementById('score-val').textContent = Math.floor(score);
  if (score > hi) {
    hi = score;
    document.getElementById('hi-val').textContent = Math.floor(hi);
  }

  // Homer movement
  if (homer.moving.up)   homer.y -= HOMER_SPD;
  if (homer.moving.down) homer.y += HOMER_SPD;
  homer.y = Math.max(HOMER_MIN_Y, Math.min(HOMER_MAX_Y, homer.y));

  // Scroll layers
  updateLayers(speed);

  // Donuts
  donutTimer++;
  if (donutTimer >= donutInterval) {
    donutTimer = 0;
    donutInterval = Math.max(35, 70 - (speed - 3.5) * 6 + Math.random() * 25);
    spawnDonut();
    // Sometimes spawn 2
    if (Math.random() < 0.25) {
      setTimeout(spawnDonut, 300);
    }
  }

  donuts.forEach(d => {
    d.x  -= speed * 1.6;
    d.rot += d.rotV;
    d.wobble += 0.05;
    d.y += d.vy + Math.sin(d.wobble) * 0.4;
    // Drift vy slightly toward center
    d.vy *= 0.99;
  });
  donuts = donuts.filter(d => d.x > -80);

  // Collision
  if (invincible <= 0) {
    for (let i = donuts.length - 1; i >= 0; i--) {
      const d = donuts[i];
      if (circleRect(d.x, d.y, d.r, homer.x, homer.y, homer.w, homer.h)) {
        // Hit!
        lives--;
        renderLivesUI();
        invincible = 120;
        triggerDoh();
        burst(d.x, d.y, [d.col.glaze, '#FFF', d.col.sprinkles[0]], 18);
        donuts.splice(i, 1);
        if (lives <= 0) {
          triggerGameOver();
          return;
        }
        break;
      }
    }
  } else {
    invincible--;
    if (invincible === 0) {
      document.getElementById('doh-flash').style.opacity = '0';
    }
  }

  // Drool effect (Homer drools when donut is nearby)
  const nearest = donuts.find(d => Math.abs(d.x - homer.x) < 180 && d.x > homer.x);
  if (nearest && Math.random() < 0.15) {
    drools.push({
      x: homer.x + 60,
      y: homer.y + 52,
      vy: 1.5 + Math.random(),
      alpha: 0.9,
      r: 3 + Math.random() * 2,
    });
  }
  drools.forEach(dr => {
    dr.y   += dr.vy;
    dr.vy  += 0.12;
    dr.alpha -= 0.025;
  });
  drools = drools.filter(dr => dr.alpha > 0);

  // Particles
  particles.forEach(p => {
    p.x     += p.vx; p.y     += p.vy;
    p.vy    += 0.15; p.alpha -= 0.028;
  });
  particles = particles.filter(p => p.alpha > 0);

  // Popups
  popups.forEach(p => { p.y += p.vy; p.alpha -= 0.025; });
  popups = popups.filter(p => p.alpha > 0);

  // D'oh timer
  if (dohTimer > 0) {
    dohTimer--;
    if (dohTimer === 0) {
      document.getElementById('doh-flash').style.opacity = '0';
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground(speed);
  donuts.forEach(drawDonut);

  // Drool
  drools.forEach(dr => {
    ctx.globalAlpha = dr.alpha;
    ctx.fillStyle = '#7EC8E3';
    ctx.beginPath(); ctx.arc(dr.x, dr.y, dr.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  drawHomer(homer.x, homer.y, invincible > 0);

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.col;
    if (p.isSquare) {
      ctx.fillRect(p.x - p.r, p.y - p.r, p.r*2, p.r*2);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // Popups
  popups.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.font        = 'bold 22px Bangers';
    ctx.fillStyle   = p.col;
    ctx.textAlign   = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha = 1;
  });
}

function loop() {
  if (state !== 'running') return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.code === 'ArrowUp'   || e.code === 'KeyW') homer.moving.up   = true;
  if (e.code === 'ArrowDown' || e.code === 'KeyS') homer.moving.down = true;
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowUp'   || e.code === 'KeyW') homer.moving.up   = false;
  if (e.code === 'ArrowDown' || e.code === 'KeyS') homer.moving.down = false;
});

// Touch / swipe
let touchStartY = 0;
canvas.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  homer.y += dy * 0.5;
  homer.y  = Math.max(HOMER_MIN_Y, Math.min(HOMER_MAX_Y, homer.y));
  touchStartY = e.touches[0].clientY;
}, { passive: true });

// ══════════════════════════════════════════════
//  BUTTONS
// ══════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', restartGame);

// ══════════════════════════════════════════════
//  IDLE RENDER
// ══════════════════════════════════════════════
initLayers();
(function idle() {
  ctx.clearRect(0, 0, W, H);
  drawBackground(0);
  drawHomer(HOMER_X, H/2 - 40, false);
})();
</script>
</body>
